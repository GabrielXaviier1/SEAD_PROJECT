<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <nav class="sidebar">
            <div class="sidebar-header"><img src="Logo SEAD.png" class="logo-small"></div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="docentes.html"><i class="fas fa-user-tie"></i> Docentes</a></li>
                <li><a href="horarios.html" class="active"><i class="fas fa-calendar-alt"></i> Grade Horária</a></li>
                
                <li class="logout">
                    <a href="index.html" onclick="confirmarSair(event)">
                        <i class="fas fa-sign-out-alt"></i> Sair
                    </a>
                </li>
            </ul>
        </nav>

        <main class="main-content">
            <h2><i class="fas fa-calendar-alt"></i> Grade de Atribuição</h2>
            <div class="grid-horarios">
                <div class="grid-header">Horário</div>
                <div class="grid-header">Segunda</div>
                <div class="grid-header">Terça</div>
                <div class="grid-header">Quarta</div>
                <div class="grid-header">Quinta</div>
                <div class="grid-header">Sexta</div>
                
                <div class="time-slot">19:00</div>
                <div class="class-card">Algoritmos <br> <strong>Prof. Gabriel</strong></div>
                <div class="class-card">Cálculo I <br> <strong>Prof. Leonardo</strong></div>
                <div class="class-card">Projetos <br> <strong>Prof. Luan</strong></div>
                <div class="class-card">Banco de Dados <br> <strong>Prof. Arthur</strong></div>
                <div class="class-card">Sistemas Op. <br> <strong>Prof. Silva</strong></div>
            </div>
        </main>
    </div>

    <script>
        function confirmarSair(event) {
            event.preventDefault(); 
            if (confirm("Deseja realmente sair?")) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
